dataflows:
  - name: dataflow1
    sources:
      - name: person_inputs
        path: "data/input/events/person/*"
        format: JSON
        options:
          multiLine: "true"
    transformations:
      - name: validation
        type: validate_fields
        params:
          input: person_inputs
          validations:
            - field: office
              validations:
                - notEmpty
            - field: age
              validations:
                - notNull
      - name: ok_with_date
        type: add_fields
        params:
          input: validation_ok
          addFields:
            - name: dt
              function: current_timestamp
    sinks:
      - input: ok_with_date
        name: raw-ok
        paths:
          - "data/output/events/person"
        format: DELTA
        saveMode: APPEND
        uniqueKey: [name]
        # uniqueKey: Use Delta MERGE for deduplication on APPEND mode
        # When same 'name' appears in multiple runs:
        #   - First run: Inserts all rows
        #   - Second run: Updates existing rows (same name), inserts new rows
        # This prevents duplicate records in APPEND mode
        # 
        # To change the key when natural ID becomes available:
        # uniqueKey: [customer_id]  # Just change this line, no code changes needed
        
      - input: validation_ko
        name: raw-ko
        paths:
          - "data/output/discards/person"
        format: DELTA
        saveMode: APPEND
        uniqueKey: [name]
        # Note: No uniqueKey needed for OVERWRITE (overwrites entire table)
